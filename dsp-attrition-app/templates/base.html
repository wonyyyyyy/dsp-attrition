<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Employee Attrition App{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Core Palette */
        --red:          #e5201e;
        --red-strong:   #c0100e;
        --red-glow:     rgba(229, 32, 30, 0.22);
        --red-soft:     rgba(229, 32, 30, 0.10);
        --red-border:   rgba(229, 32, 30, 0.25);

        --ink:          #f1f5f9;
        --ink-muted:    #94a3b8;
        --ink-dim:      #64748b;

        --surface:      #111318;
        --surface-2:    #181c23;
        --surface-3:    #1e222c;
        --surface-4:    #252a35;
        --surface-card: #161a22;

        --border:       rgba(255,255,255,0.07);
        --border-soft:  rgba(255,255,255,0.04);
        --border-red:   rgba(229, 32, 30, 0.30);

        --shadow:       0 20px 60px rgba(0,0,0,0.55);
        --shadow-red:   0 8px 32px rgba(229,32,30,0.25);
        --shadow-focus: 0 0 0 3px rgba(229,32,30,0.30);

        --radius-lg:    1.25rem;
        --radius-md:    0.85rem;
        --radius-sm:    0.55rem;

        --space-1: 0.5rem;
        --space-2: 0.75rem;
        --space-3: 1rem;
        --space-4: 1.5rem;
        --space-5: 2rem;
        --space-6: 3rem;
      }

      *, *::before, *::after { box-sizing: border-box; }

      html { scroll-behavior: smooth; }

      body {
        font-family: "Inter", sans-serif;
        color: var(--ink);
        background-color: var(--surface);
        background-image:
          radial-gradient(ellipse 80% 50% at 50% -10%, rgba(229,32,30,0.12) 0%, transparent 60%),
          radial-gradient(ellipse 60% 40% at 80% 120%, rgba(229,32,30,0.07) 0%, transparent 55%);
        min-height: 100vh;
        margin: 0;
        padding-top: 75px;
        -webkit-font-smoothing: antialiased;
      }

      a {
        text-decoration: none;
        transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      }

      .container { max-width: 1200px; }

      /* ── NAVBAR ── */
      .navbar {
        background: rgba(12, 14, 18, 0.88) !important;
        backdrop-filter: blur(18px) saturate(1.4);
        -webkit-backdrop-filter: blur(18px) saturate(1.4);
        border-bottom: 1px solid var(--border);
        transition: background 0.3s ease;
      }

      .navbar .container { min-height: 65px; }

      .navbar-brand {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 800;
        font-size: 1.18rem;
        letter-spacing: 0.02em;
        color: #fff !important;
        display: flex;
        align-items: center;
        gap: 0.55rem;
      }

      .navbar-brand .brand-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: var(--red);
        border-radius: 50%;
        box-shadow: 0 0 8px var(--red);
      }

      .nav-link {
        font-weight: 600;
        font-size: 0.88rem;
        border-radius: var(--radius-sm);
        padding: 0.5rem 0.9rem !important;
        color: rgba(241,245,249,0.65) !important;
        letter-spacing: 0.01em;
        position: relative;
      }

      .nav-link:hover {
        color: #fff !important;
        background: rgba(255,255,255,0.06);
      }

      .nav-link.active {
        color: #fff !important;
        background: rgba(229,32,30,0.15);
        border: 1px solid var(--border-red);
      }

      .navbar-toggler {
        border: 1px solid var(--border);
        padding: 0.4rem 0.65rem;
      }

      .navbar-toggler-icon {
        filter: invert(1) opacity(0.7);
      }

      /* ── PAGE SHELL ── */
      .app-shell {
        padding: var(--space-5) 0 var(--space-6);
      }

      .page-stack {
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
      }

      /* ── SURFACE CARDS ── */
      .surface-card {
        background: var(--surface-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        overflow: hidden;
        position: relative;
      }

      .surface-accent {
        background:
          radial-gradient(ellipse 70% 60% at 80% -20%, rgba(229,32,30,0.14) 0%, transparent 55%),
          linear-gradient(160deg, var(--surface-2), var(--surface-card));
      }

      .surface-accent::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(229,32,30,0.12);
        pointer-events: none;
      }

      .subtle-panel {
        background: var(--surface-3);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        height: 100%;
        position: relative;
        overflow: hidden;
      }

      .subtle-panel::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--red) 0%, transparent 80%);
        border-radius: var(--radius-md) var(--radius-md) 0 0;
      }

      .page-section {
        padding: clamp(1.5rem, 2.5vw, 2.5rem);
      }

      /* ── TYPOGRAPHY ── */
      .eyebrow, .panel-meta {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        margin-bottom: 0;
        font-size: 0.73rem;
        font-weight: 700;
        letter-spacing: 0.10em;
        text-transform: uppercase;
      }

      .eyebrow {
        color: var(--red);
        background: var(--red-soft);
        border: 1px solid var(--red-border);
        border-radius: 999px;
        padding: 0.45rem 0.85rem;
      }

      .panel-meta {
        color: var(--ink-muted);
      }

      .hero-title, .section-title {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 800;
        line-height: 1.08;
        margin-bottom: 0.85rem;
        color: #fff;
      }

      .hero-title {
        font-size: clamp(2.2rem, 5vw, 3.75rem);
        max-width: 14ch;
      }

      .section-title {
        font-size: clamp(1.6rem, 3vw, 2.35rem);
      }

      .hero-copy, .section-copy {
        font-size: 1rem;
        line-height: 1.8;
        max-width: 60ch;
        color: var(--ink-muted);
      }

      .text-muted {
        color: var(--ink-muted) !important;
      }

      .text-dim {
        color: var(--ink-dim) !important;
      }

      .text-balance { text-wrap: balance; }

      /* ── ACTION ROW ── */
      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
      }

      /* ── INFO LIST ── */
      .info-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: var(--space-3);
      }

      .info-list li {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding-bottom: var(--space-3);
        border-bottom: 1px solid var(--border);
        color: var(--ink-muted);
        font-size: 0.9rem;
      }

      .info-list li:last-child {
        padding-bottom: 0;
        border-bottom: 0;
      }

      .info-list strong {
        color: #fff;
        font-weight: 700;
        text-align: right;
      }

      /* ── ALERTS ── */
      .app-alert {
        border-width: 1px;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow);
        padding: 1.1rem 1.35rem;
        font-weight: 500;
      }

      .app-alert .alert-heading {
        font-weight: 800;
      }

      .alert-danger {
        background: rgba(229,32,30,0.12);
        border-color: var(--border-red);
        color: #fca5a5;
      }

      .alert-success {
        background: rgba(34,197,94,0.10);
        border-color: rgba(34,197,94,0.25);
        color: #86efac;
      }

      .alert-warning {
        background: rgba(234,179,8,0.10);
        border-color: rgba(234,179,8,0.25);
        color: #fde047;
      }

      .alert-info {
        background: rgba(56,189,248,0.10);
        border-color: rgba(56,189,248,0.25);
        color: #7dd3fc;
      }

      .alert-secondary {
        background: var(--surface-3);
        border-color: var(--border);
        color: var(--ink-muted);
      }

      /* ── BUTTONS ── */
      .btn {
        border-radius: var(--radius-md);
        font-weight: 700;
        font-size: 0.9rem;
        padding: 0.75rem 1.35rem;
        transition: all 0.2s ease;
        letter-spacing: 0.01em;
      }

      .btn-lg {
        padding: 0.9rem 1.75rem;
        font-size: 0.95rem;
      }

      .btn-primary {
        background: var(--red);
        border-color: var(--red);
        color: #fff;
        box-shadow: 0 4px 16px rgba(229,32,30,0.35);
      }

      .btn-primary:hover, .btn-primary:focus {
        background: var(--red-strong);
        border-color: var(--red-strong);
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(229,32,30,0.45);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .btn-outline-primary {
        border-color: var(--red-border);
        color: var(--red);
        background: transparent;
      }

      .btn-outline-primary:hover, .btn-outline-primary:focus {
        background: var(--red-soft);
        border-color: var(--red);
        color: #fca5a5;
        transform: translateY(-1px);
      }

      .btn:disabled, .btn[disabled] {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
        pointer-events: all;
      }

      /* ── FORM ELEMENTS ── */
      .form-label {
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 0.88rem;
        color: var(--ink);
      }

      .field-label-row {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.15rem;
        margin-bottom: 0.5rem;
      }

      .field-label-row .form-label {
        margin-bottom: 0;
      }

      .field-label-help {
        display: block;
        color: var(--ink-dim);
        font-size: 0.76rem;
        line-height: 1.45;
        font-weight: 400;
      }

      .form-control, .form-select {
        min-height: 48px;
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: var(--radius-md);
        padding: 0.75rem 0.95rem;
        background: var(--surface-3);
        color: var(--ink);
        font-size: 0.9rem;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .form-select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e") !important;
        background-repeat: no-repeat !important;
        background-position: right 0.75rem center !important;
        background-size: 16px 12px !important;
      }

      textarea.form-control {
        min-height: 205px;
        resize: vertical;
      }

      .form-control::placeholder, textarea.form-control::placeholder {
        color: rgba(148,163,184,0.35);
        opacity: 1;
      }

      .form-control:focus, .form-select:focus {
        background: var(--surface-4);
        border-color: var(--red-border);
        box-shadow: var(--shadow-focus);
        outline: none;
        color: var(--ink);
      }

      .form-check-input:checked {
        background-color: var(--red);
        border-color: var(--red);
      }

      .form-check-input:focus {
        box-shadow: var(--shadow-focus);
      }

      /* ── FIELD SHELL ── */
      .field-shell {
        position: relative;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        height: 100%;
        transition: border-color 0.2s ease;
      }

      .field-shell:hover {
        border-color: rgba(255,255,255,0.12);
      }

      .field-popup {
        display: none;
        margin-bottom: 0.75rem;
        padding: 0.65rem 0.85rem;
        border: 1px solid rgba(229,32,30,0.30);
        border-radius: var(--radius-sm);
        background: rgba(229,32,30,0.08);
        color: #fca5a5;
        font-size: 0.82rem;
        line-height: 1.45;
      }

      .field-popup.is-visible {
        display: block;
        animation: fieldPopupIn 0.15s ease-out;
      }

      .field-shell.field-over-limit .form-control {
        border-color: var(--red-border);
        box-shadow: 0 0 0 2px rgba(229,32,30,0.15);
      }

      @keyframes fieldPopupIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── METRIC CHIP ── */
      .metric-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.45rem 0.85rem;
        border-radius: 999px;
        background: var(--surface-3);
        border: 1px solid var(--border);
        color: var(--ink-muted);
        font-weight: 600;
        font-size: 0.82rem;
        white-space: nowrap;
      }

      /* ── BADGE ── */
      .badge {
        border-radius: 999px;
        font-weight: 700;
        font-size: 0.75rem;
      }

      /* ── CODE ── */
      code {
        color: #fca5a5;
        background: rgba(229,32,30,0.12);
        border: 1px solid rgba(229,32,30,0.20);
        border-radius: 0.35rem;
        padding: 0.1rem 0.38rem;
        font-size: 0.85em;
      }

      /* ── FORM HINT ── */
      .form-hint, .status-text {
        min-height: 1.5rem;
        font-size: 0.85rem;
      }

      /* ── IFRAME WRAPPER ── */
      .iframe-wrapper {
        position: relative;
        padding-bottom: 62%;
        height: 0;
        overflow: hidden;
        border-radius: var(--radius-md);
        background: var(--surface-2);
        border: 1px solid var(--border);
      }

      .iframe-wrapper iframe {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        border: 0;
        border-radius: var(--radius-md);
      }

      /* ── FEATURE CARD ── */
      .feature-card {
        transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      }

      .feature-card:hover {
        transform: translateY(-4px);
        border-color: var(--red-border);
        box-shadow: var(--shadow-red);
      }

      .feature-card h3, .feature-card h4 {
        font-weight: 700;
        color: #fff;
      }

      /* ── DIVIDER LINE ── */
      .section-divider {
        width: 3rem;
        height: 3px;
        background: linear-gradient(90deg, var(--red), transparent);
        border-radius: 999px;
        margin: 0.75rem 0 1.25rem;
      }

      /* ── SCROLLBAR ── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--surface-2); }
      ::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(229,32,30,0.5); }

      /* ── RESPONSIVE ── */
      @media (max-width: 991.98px) {
        .app-shell { padding: var(--space-4) 0 var(--space-5); }
        .iframe-wrapper { padding-bottom: 75%; }
      }

      @media (max-width: 767.98px) {
        body { padding-top: 70px; }
        .page-section { padding: 1.25rem; }
        .action-row .btn, .action-row a { width: 100%; }
        .iframe-wrapper { padding-bottom: 90%; }
        .hero-title { font-size: clamp(1.8rem, 7vw, 2.5rem); }
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand" href="/">
          <span class="brand-dot"></span>
          DS-HAKIM
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto gap-1">
            <li class="nav-item">
              <a
                class="nav-link {% if request.path == '/' %}active{% endif %}"
                href="/"
              >Home</a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.path == '/dashboard' %}active{% endif %}"
                href="/dashboard"
              >Dashboard Analitik</a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.path == '/predict' %}active{% endif %}"
                href="/predict"
              >Prediksi Attrition</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container app-shell">{% block content %}{% endblock %}</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
